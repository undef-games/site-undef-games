{{ $products := hugo.Data.site.home.products }}
<section class="scan-section" id="projects" aria-label="undef games projects">
  <p class="scan-kicker">Live routes</p>
  <h2>Projects built to be used, watched, and played with.</h2>
  <div class="scan-products">
    {{ range $products }}
      <a class="scan-product" href="{{ .href }}">
        <span>{{ .tag }}</span>
        <strong>{{ .label }}</strong>
        <small>{{ .description }}</small>
      </a>
    {{ end }}
  </div>
</section>
