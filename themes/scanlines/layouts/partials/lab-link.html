<div class="quick-cluster" aria-label="Display mode and lab">
  <button class="theme-quick-toggle" type="button" aria-label="Switch to light mode" data-theme-toggle>
    <svg class="theme-quick-toggle__icon theme-quick-toggle__icon--sun" aria-hidden="true" focusable="false" viewBox="0 0 24 24">
      <path d="M12 4v2M12 18v2M4 12h2M18 12h2M6.3 6.3l1.4 1.4M16.3 16.3l1.4 1.4M17.7 6.3l-1.4 1.4M7.7 16.3l-1.4 1.4" />
      <circle cx="12" cy="12" r="3.5" />
    </svg>
    <svg class="theme-quick-toggle__icon theme-quick-toggle__icon--moon" aria-hidden="true" focusable="false" viewBox="0 0 24 24">
      <path d="M17.8 15.6a7 7 0 0 1-9.4-9.4 7.4 7.4 0 1 0 9.4 9.4Z" />
    </svg>
  </button>
  <a class="lab-quick-link" href="{{ site.Params.lab }}" aria-label="Open lab">
    <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
      <path d="M9 3h6M10 3v6l-5 8a3 3 0 0 0 2.6 4.5h8.8A3 3 0 0 0 19 17l-5-8V3" />
      <path d="M7.8 15h8.4" />
    </svg>
  </a>
</div>
