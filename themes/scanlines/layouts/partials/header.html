<header class="site-header" role="banner">
  <div class="site-header__inner">
    <a
      class="site-header__brand"
      href="/"
      aria-label="{{ site.Params.site_name }} home"
      {{ partial "testid.html" (dict "value" "site-brand-home") | safeHTMLAttr }}
    >
      {{ with site.Params.brand_mark }}<span class="site-header__mark" aria-hidden="true">{{ . }}</span>{{ end }}
      <span>{{ site.Params.site_name }}</span>
    </a>
    <nav class="site-header__nav" aria-label="Primary navigation"
      {{ partial "testid.html" (dict "value" "site-nav") | safeHTMLAttr }}
    >
      {{ range site.Params.nav }}
        <a href="{{ .href }}"
          {{ if eq $.RelPermalink .href }}aria-current="page"{{ end }}
          {{ partial "testid.html" (dict "value" (printf "site-nav-%s" (urlize .label))) | safeHTMLAttr }}
        >{{ .label }}</a>
      {{ end }}
    </nav>
    {{ with site.Params.cta }}
      <a class="site-header__login" href="{{ .href }}"
        {{ partial "testid.html" (dict "value" "site-cta") | safeHTMLAttr }}
      >{{ .label }}</a>
    {{ end }}
  </div>
</header>
