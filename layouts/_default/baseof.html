<!doctype html>
<html lang="{{ or site.Language.Locale site.Language.Lang "en-us" }}">
{{- partial "head.html" . -}}
<body class="{{ if .IsHome }}page-home{{ else }}page-{{ or .Section .Type "interior" }}{{ end }}">
  {{- partial "header.html" . -}}
  {{- block "main" . }}{{- end }}
  {{- partial "lab-link.html" . -}}
  {{- partial "footer.html" . -}}
  {{ if .IsHome -}}
    <script type="module" src="/lab/assets/site.js"></script>
  {{- end }}
</body>
</html>
